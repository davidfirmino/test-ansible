---
- name: Stabilized Benchmark - Pure Storage FlashArray//ST
  hosts: localhost
  connection: local
  become: yes
  vars:
    data_file: "/pg-data/test_data.fio"
    wal_file: "/pg-wal/test_wal.fio"
    runtime_sec: 120
    output_dir: "/tmp/fio_results"

  tasks:
    - name: 1. Run FIO with Group Reporting (Consolidated Results)
      shell: |
        fio --ioengine=io_uring --direct=1 --group_reporting=1 --time_based \
        --runtime={{ runtime_sec }} --output-format=json \
        --name=DATA_OLTP_8K --filename={{ data_file }} --bs=8k --rw=randrw --rwmixread=70 --iodepth=64 --numjobs=8 \
        --name=WAL_SYNC_8K  --filename={{ wal_file }}  --bs=8k --rw=write --iodepth=1 --sync=1 \
        --name=WAL_AGG_2MB  --filename={{ wal_file }}  --bs=2M --rw=write --iodepth=4 --sync=1 \
        > {{ output_dir }}/benchmark_results.json

    - name: 2. Read JSON Results
      slurp:
        src: "{{ output_dir }}/benchmark_results.json"
      register: fio_raw

    - name: 3. Set FIO Results
      set_fact:
        fio_data: "{{ fio_raw.content | b64decode | from_json }}"

    - name: 4. FINAL PERFORMANCE REPORT
      debug:
        msg: 
          - "======================================================================"
          - "PURE STORAGE //ST - DATA SHEET VALIDATION"
          - [cite_start]"Target: 18M IOPS | 200GB/s BW | Consistent Ultra-Low Latency "
          - "======================================================================"
          - "JOB:         {{ item.jobname }}"
          - "BLOCKSIZE:   {{ item['job options'].bs }}"
          - "IOPS:        {{ '{:,.0f}'.format(item.get('read', {}).get('iops', 0) + item.get('write', {}).get('iops', 0)) }}"
          - "THROUGHPUT:  {{ ((item.get('read', {}).get('bw_bytes', 0) + item.get('write', {}).get('bw_bytes', 0)) / 1024 / 1024) | round(2) }} MB/s"
          - "AVG LATENCY: {{ avg_val }} us"
          - "p99 LATENCY: {{ p99_val }} us"
          - "MAX LATENCY: {{ max_val }} us"
          - "----------------------------------------------------------------------"
      loop: "{{ fio_data.jobs }}"
      vars:
     
        p_obj: "{{ item.write if item.write.iops > 0 else item.read }}"
        avg_val: "{{ (p_obj.lat_ns.mean / 1000) | round(2) }}"
        p99_val: "{{ (p_obj.lat_ns.percentile['99.000000'] / 1000) | round(2) }}"
        max_val: "{{ (p_obj.lat_ns.max / 1000) | round(2) }}"
