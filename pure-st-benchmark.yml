---
- name: Stabilized Benchmark - Pure Storage FlashArray//ST
  hosts: localhost
  connection: local
  become: yes
  vars:
    data_file: "/pg-data/test_data.fio"
    wal_file: "/pg-wal/test_wal.fio"
    runtime_sec: 120
    output_dir: "/tmp/fio_results"

  tasks:
    - name: 1. System Tuning for RoCE
      shell: |
        prlimit --pid $$ --memlock=unlimited:unlimited
        sysctl -w fs.aio-max-nr=1048576
      ignore_errors: yes

    - name: 2. Create Results Directory
      file:
        path: "{{ output_dir }}"
        state: directory

    - name: 3. Run Multi-Volume FIO
      shell: |
        fio --ioengine=io_uring --direct=1 --group_reporting=1 --time_based \
        --runtime={{ runtime_sec }} --output-format=json \
        --name=DATA_OLTP_8K --filename={{ data_file }} --bs=8k --rw=randrw --rwmixread=70 --iodepth=64 --numjobs=8 \
        --name=WAL_SYNC_8K  --filename={{ wal_file }}  --bs=8k --rw=write --iodepth=1 --sync=1 \
        --name=WAL_AGG_2MB  --filename={{ wal_file }}  --bs=2M --rw=write --iodepth=4 --sync=1 \
        > {{ output_dir }}/benchmark_results.json

    - name: 4. Read JSON Results
      slurp:
        src: "{{ output_dir }}/benchmark_results.json"
      register: fio_raw

    - name: 5. Set FIO Results Fact
      set_fact:
        fio_data: "{{ fio_raw.content | b64decode | from_json }}"

    - name: 6. Performance Report
      debug:
        msg: |
          ======================================================================
          PURE STORAGE //ST - PERFORMANCE REPORT
          ======================================================================
          Specs: 18M IOPS | 200GB/s BW | NVMe-oF (ROCE)
          ======================================================================
          {% for job in fio_data.jobs %}
          JOB:         {{ job.jobname }}
          BLOCKSIZE:   {{ job['job options'].bs }}
          IOPS:        {{ (job.get('read', {}).get('iops', 0) + job.get('write', {}).get('iops', 0)) | int }}
          THROUGHPUT:  {{ ((job.get('read', {}).get('bw_bytes', 0) + job.get('write', {}).get('bw_bytes', 0)) / 1024 / 1024) | round(2) }} MB/s
          AVG LATENCY: {{ ((job.get('read',{}).get('lat_ns',{}).get('mean',0) + job.get('write',{}).get('lat_ns',{}).get('mean',0)) / 1000) | round(2) }} us
          ----------------------------------------------------------------------
          {% endfor %}
