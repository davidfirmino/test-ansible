---
- name: Final High-Performance Benchmark - Pure Storage FlashArray//ST
  hosts: localhost
  connection: local
  become: yes
  vars:
    data_mount: "/pg-data"
    wal_mount: "/pg-wal"
    data_file: "/pg-data/test_data.fio"
    wal_file: "/pg-wal/test_wal.fio"
    runtime_sec: 120
    output_dir: "/tmp/fio_results"

  tasks:
    - name: 1. System Tuning for RoCE (Memlock & AIO)
      shell: |
        prlimit --pid $$ --memlock=unlimited:unlimited
        sysctl -w fs.aio-max-nr=1048576

    - name: 2. Pre-flight Check - Verify Mounts
      assert:
        that:
          - ansible_mounts | selectattr('mount', 'equalto', data_mount) | list | length > 0
          - ansible_mounts | selectattr('mount', 'equalto', wal_mount) | list | length > 0

    - name: 3. Pre-allocate Test Files (Avoid FS Metadata Latency)
      shell: |
        mkdir -p {{ output_dir }}
        fallocate -l 10G {{ data_file }}
        fallocate -l 5G {{ wal_file }}

    - name: 4. Run Multi-Volume FIO (Postgres Profiles)
      shell: |
        fio --ioengine=io_uring --direct=1 --group_reporting --time_based \
        --runtime={{ runtime_sec }} --output-format=json --gtod_reduce=1 \
        --name=DATA_OLTP_8K --filename={{ data_file }} --bs=8k --rw=randrw --rwmixread=70 --iodepth=64 --numjobs=8 \
        --name=WAL_SYNC_8K  --filename={{ wal_file }}  --bs=8k --rw=write --iodepth=1 --sync=1 \
        --name=WAL_AGG_2MB  --filename={{ wal_file }}  --bs=2M --rw=write --iodepth=4 --sync=1 \
        > {{ output_dir }}/benchmark_results.json

    - name: 5. Read JSON Results
      slurp:
        src: "{{ output_dir }}/benchmark_results.json"
      register: fio_json_raw

    - name: 6. HEADER - Storage Specifications
      debug:
        msg: 
          - "======================================================================"
          - "PURE STORAGE //ST PERFORMANCE REPORT (NVMe-oF RoCE)"
          - "Target: 18M IOPS | 200GB/s BW | Sub-1ms Latency"
          - "Architecture: No Dedupe/Compression (Ultra-Low Latency Path)"
          - "======================================================================"

    - name: 7. DETAIL - Per Volume Results
      vars:
        fio_data: "{{ fio_json_raw.content | b64decode | from_json }}"
      debug:
        msg: 
          - "JOB:         {{ item.jobname }}"
          - "BLOCKSIZE:   {{ item['job options'].bs }}"
          - "IOPS:        {{ '{:,.0f}'.format(item.read.iops + item.write.iops) }}"
          - "THROUGHPUT:  {{ ((item.read.bw_bytes + item.write.bw_bytes) / 1024 / 1024) | round(2) }} MB/s"
          - "p99 LATENCY: {{ (item.write.clat_ns.percentile['99.000000'] | default(item.read.clat_ns.percentile['99.000000']) | float / 1000) | round(2) }} us"
          - "STATUS:      {{ '✅ PASS (<1ms)' if (item.write.clat_ns.percentile['99.000000'] | default(item.read.clat_ns.percentile['99.000000']) | float / 1000) < 1000 else '❌ FAIL (>1ms)' }}"
          - "----------------------------------------------------------------------"
      loop: "{{ fio_data.jobs }}"
      loop_control:
        label: "{{ item.jobname }}"
