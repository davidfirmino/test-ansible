---
- name: Final High-Performance Benchmark - Pure Storage FlashArray//ST
  hosts: localhost
  connection: local
  become: yes
  vars:
    data_mount: "/pg-data"
    wal_mount: "/pg-wal"
    data_file: "/pg-data/test_data.fio"
    wal_file: "/pg-wal/test_wal.fio"
    runtime_sec: 120
    output_dir: "/tmp/fio_results"

  tasks:
    - name: 1. System Tuning for RoCE (Memlock & AIO)
      shell: |
        prlimit --pid $$ --memlock=unlimited:unlimited
        sysctl -w fs.aio-max-nr=1048576
      ignore_errors: yes

    - name: 2. Pre-flight Check - Verify Mounts
      assert:
        that:
          - ansible_mounts | selectattr('mount', 'equalto', data_mount) | list | length > 0
          - ansible_mounts | selectattr('mount', 'equalto', wal_mount) | list | length > 0
        fail_msg: "ERROR: Pure ST volumes not found at {{ data_mount }} or {{ wal_mount }}."

    - name: 3. Pre-allocate Test Files
      shell: "fallocate -l 10G {{ data_file }} && fallocate -l 5G {{ wal_file }}"
      args:
        creates: "{{ data_file }}"

    - name: 4. Run Multi-Volume FIO
      shell: |
        fio --ioengine=io_uring --direct=1 --group_reporting --time_based \
        --runtime={{ runtime_sec }} --output-format=json --gtod_reduce=1 \
        --name=DATA_OLTP_8K --filename={{ data_file }} --bs=8k --rw=randrw --rwmixread=70 --iodepth=64 --numjobs=8 \
        --name=WAL_SYNC_8K  --filename={{ wal_file }}  --bs=8k --rw=write --iodepth=1 --sync=1 \
        --name=WAL_AGG_2MB  --filename={{ wal_file }}  --bs=2M --rw=write --iodepth=4 --sync=1 \
        > {{ output_dir }}/benchmark_results.json

    - name: 5. Read and Parse JSON Results
      slurp:
        src: "{{ output_dir }}/benchmark_results.json"
      register: fio_raw

    - name: 6. Set FIO Data Fact
      set_fact:
        fio_results: "{{ fio_raw.content | b64decode | from_json }}"

    - name: 7. HEADER - Storage Specifications
      debug:
        msg: 
          - "======================================================================"
          - "PURE STORAGE //ST PERFORMANCE REPORT (NVMe-oF RoCE)"
          - "Target: 18M IOPS | 200GB/s BW | Consistent Ultra-Low Latency"
          - "Architecture: Bypasses Latency-Inducing Functionality"
          - "======================================================================"

    - name: 8. DETAIL - Per Volume Results
      debug:
        msg: 
          - "JOB:         {{ item.jobname }}"
          - "BLOCKSIZE:   {{ item['job options'].bs }}"
          - "IOPS:        {{ '{:,.0f}'.format(item.get('read', {}).get('iops', 0) + item.get('write', {}).get('iops', 0)) }}"
          - "THROUGHPUT:  {{ ((item.get('read', {}).get('bw_bytes', 0) + item.get('write', {}).get('bw_bytes', 0)) / 1024 / 1024) | round(2) }} MB/s"
          - "p99 LATENCY: {{ p99_display }} us"
          - "STATUS:      {{ '✅ PASS (<1ms)' if (p99_display | float) < 1000 else '❌ FAIL (>1ms)' }}"
          - "----------------------------------------------------------------------"
      loop: "{{ fio_results.jobs }}"
      loop_control:
        label: "{{ item.jobname }}"
      vars:
        # Extrai o p99 de leitura ou escrita e converte para microssegundos (us)
        p99_display: >-
          {%- set r_p = item.get('read', {}).get('clat_ns', {}).get('percentile', {}).get('99.000000', 0) | float -%}
          {%- set w_p = item.get('write', {}).get('clat_ns', {}).get('percentile', {}).get('99.000000', 0) | float -%}
          {%- set max_p = [r_p, w_p] | max -%}
          {{ (max_p / 1000) | round(2) }}
