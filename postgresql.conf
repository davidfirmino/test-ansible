# ==========================================================
# POSTGRESQL FORENSIC CONFIG (IO STRESS LAB v1.0)
# Target: Test PureST RoCE/RDMA Tail Latency
# ==========================================================

# --- Conexões e Memória ---
listen_addresses = '*'
max_connections = 200
# Reduzimos o cache para forçar o banco a ler do disco (dm-3/dm-4)
shared_buffers = 256MB
temp_buffers = 32MB
work_mem = 64MB

# --- Write Ahead Log (WAL) - O Coração do Teste ---
# Aqui simulamos o comportamento de Batching/Group Commit
wal_level = minimal
synchronous_commit = on            # Essencial para simular o "Wait" do Sync DC
commit_delay = 5000                # Espera 5ms para agrupar transações (Batch)
commit_siblings = 5                # Só faz o delay se houver 5+ transações
wal_sync_method = fdatasync
full_page_writes = on

# --- Checkpoints (Onda de Escrita Aleatória) ---
# Configuramos para serem agressivos e visíveis no histograma
checkpoint_timeout = 5min
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.5  # Força o flush de dados mais rápido

# --- Background Writer ---
# Deixamos o processo de fundo mais lento para o Checkpoint ser mais "pesado"
bgwriter_delay = 500ms
bgwriter_lru_maxpages = 50
bgwriter_lru_multiplier = 2.0

# --- Planejador de Consultas ---
# Forçamos o Postgres a não confiar no cache do SO
effective_cache_size = 512MB

# --- Log de Performance ---
# Para você comparar o log do banco com o seu script
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_duration_statement = 100   # Loga qualquer query lenta (>100ms)
log_checkpoints = on
log_lock_waits = on
